syntax = "proto3";

package ca.qc.bdeb.sim.elekflow.proto;
option java_multiple_files = true;

message Circuit {
    repeated Component components = 1;
    repeated Node nodes = 2;
    repeated Wire wires = 3;
}

message Component {
    string id = 1;
    string type = 2; // e.g., "RESISTOR", "CAPACITOR"
    double value = 3;
    double x = 4;
    double y = 5;
    double rotation = 6;
}

message Node {
    int32 id = 1; // This matches your MNA matrix index (Row/Col)
    double x = 2; // Visual position of the junction dot
    double y = 3;
    repeated Connection connections = 4;
}

message Connection {
    string component_id = 1;
    int32 pin_index = 2;
}

message Wire {
    string from_component_id = 1;
    int32 from_pin = 2;
    string to_component_id = 3;
    int32 to_pin = 4;
    repeated Point points = 5; // The "elbow" points of your Polyline
}

message Point {
    double x = 1;
    double y = 2;
}