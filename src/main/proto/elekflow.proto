syntax = "proto3";

package ca.qc.bdeb.sim.elekflow.proto;
option java_multiple_files = true;

message Elk{
    MetaData meta_data = 1;
    Content content = 2;
}

message MetaData{
    uint64 magic_number = 1;
    uint32 app_version = 2;
    string project_name = 3;
    Date last_modified = 4;
}

message Date{
    uint32 hour = 4;
    uint32 minute = 5;
    uint32 day = 1;
    uint32 month = 2;
    uint32 year = 3;
}

message Content{
    Circuit circuit = 1;
}

message Circuit{
    repeated Component components = 1;
    repeated Wire wires = 2;

    double translate_x = 3;
    double translate_y = 4;

    double zoom_factor = 5;
}

message Component{
    double layout_x = 1;
    double layout_y = 2;
    double rotation = 3;

    string key = 4;

    repeated Borne bornes = 5;
}

message Borne{
    uint64 index = 1;
}

message Propriete{
    string nom = 1;
    double value = 2;
}

message Wire{
    repeated Borne bornes = 1;
    repeated Point points = 2;;
}

message Point{
    double x = 1;
    double y = 2;
}


